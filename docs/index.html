<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图链工坊｜链接转图片</title>
  <style>
    :root{--green:#176c49;--ink:#193126;--muted:#66756d;--line:#dce7e0;--paper:#f7faf7}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:ui-sans-serif,system-ui,"Microsoft YaHei",sans-serif}main{max-width:1320px;margin:auto;padding:60px 24px}.hero{max-width:900px;margin:0 auto 34px;text-align:center}.eyebrow{font-size:12px;letter-spacing:.16em;color:var(--green);font-weight:800}.hero h1{font-size:clamp(32px,5vw,56px);margin:12px 0;letter-spacing:-.06em;white-space:nowrap}.hero p,.hint{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1.5fr .8fr;gap:18px}.panel,.results{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 30px #183a2410}.heading{display:flex;align-items:center;justify-content:space-between;gap:12px}.heading h2{margin:0;font-size:20px}.step{display:inline-flex;background:#e2f2e9;color:var(--green);font-weight:bold;border-radius:99px;padding:5px 8px;font-size:12px;margin-right:7px}textarea{width:100%;height:180px;border:1px solid var(--line);border-radius:12px;padding:14px;font:14px ui-monospace,Consolas;margin:12px 0;resize:vertical}button{border:0;border-radius:9px;padding:11px 14px;font-weight:700;cursor:pointer}.primary{background:var(--green);color:#fff}.secondary{background:#eaf2ed;color:var(--green)}.text{background:transparent;color:var(--green)}.actions,.result-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.notice{font-size:13px;color:var(--muted)}.privacy{display:block;margin-top:15px;padding:10px;border-radius:9px;background:#f1f7f3;font-size:13px;color:var(--green)}.results{margin-top:18px}.settings{display:flex;gap:10px;overflow:auto;padding:12px 0}.settings label{font-size:13px;white-space:nowrap}.settings select{display:block;margin-top:5px;padding:7px;border:1px solid var(--line);border-radius:7px;background:#fff}table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}.table{overflow:auto;border:1px solid var(--line);border-radius:12px}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;vertical-align:top;text-align:left}th{background:#f2f7f3;font-size:13px}td{min-width:190px}.row{width:52px;text-align:center}.card img{display:block;width:154px;height:116px;object-fit:contain;background:#f2f2f2;border-radius:8px}.fields{display:grid;gap:7px;margin-top:8px}.fields label{font-size:12px;color:var(--muted)}.fields input{display:block;margin-top:3px;width:100%;border:1px solid var(--line);padding:7px;border-radius:6px}.error{font-size:12px;color:#ad3d3d;margin-top:5px}@media(max-width:760px){main{padding:36px 14px}.grid{grid-template-columns:1fr}.hero h1{font-size:30px}.result-actions{margin-top:10px}}
  </style>
</head>
<body>
  <main>
    <section class="hero"><div class="eyebrow">LINK TO IMAGE WORKSPACE</div><h1>把链接，整齐地变成图片。</h1><p>从 Excel 复制多行、多列图片链接，保留原始表格结构；可识别 UID、DID、小红书号和手机型号，并导出嵌入图片的 Excel。</p></section>
    <section class="grid"><div class="panel"><div class="heading"><h2><span class="step">01</span>粘贴链接或图片</h2><button class="text" id="example">载入示例</button></div><p class="hint">链接：换行代表新行，Tab 代表新列。截图：先设定列数，再直接按 Ctrl+V 粘贴图片；例如复制 3 列 × 3 张图片时填写 3。</p><textarea id="source" placeholder="https://example.com/a.jpg&#9;https://example.com/b.jpg&#10;https://example.com/c.jpg&#9;https://example.com/d.jpg"></textarea><div class="actions"><label class="hint">截图字段 <select id="pasteRole"><option value="image">普通图片（不识别）</option><option value="uid_did">UID + DID</option><option value="xhs">小红书号</option><option value="phone">手机型号</option></select></label><label class="hint">图片列数 <input id="pasteColumns" type="number" min="1" max="16" value="1" style="width:54px"></label><button class="primary" id="convert">生成图片</button><button class="secondary" id="paste">粘贴剪贴板图片</button><button class="text" id="clear">清空全部</button><span id="notice" class="notice"></span></div></div><aside class="panel"><h2><span class="step">02</span>识别与导出</h2><p class="hint">在生成后为每一图片列选择字段类型，再点击识别。导出的 Excel 会将图片实际嵌入单元格。</p><span class="privacy">图片仅从原始链接读取；网站不保存你的链接、截图或识别结果。</span></aside></section>
    <section class="results" id="results" hidden><div class="heading"><div><div class="eyebrow">RESULT MATRIX</div><h2 id="summary"></h2></div><div class="result-actions"><button class="secondary" id="recognize">识别已选字段</button><button class="secondary" id="copyImages">复制单列图片（试验）</button><button class="secondary" id="fieldsExport">导出识别结果（4列）</button><button class="primary" id="export">下载嵌入图片的 Excel</button></div></div><div id="settings" class="settings"></div><div class="table"><table><thead id="head"></thead><tbody id="body"></tbody></table></div></section>
  </main>
  <script>
    const API='https://picture-workspace-api-chtx.onrender.com'; let matrix=[],roles=[],data={};
    const labels={image:'普通图片',uid_did:'UID + DID 图片',xhs:'小红书号图片',phone:'手机型号图片'};
    const $=id=>document.getElementById(id); const say=t=>$('notice').textContent=t;
    function parse(t){return t.trim().split(/\r?\n/).filter(Boolean).map(r=>r.split('\t').map(x=>x.trim()))} function url(v){if(/^data:image\/(png|jpe?g|webp|gif);base64,/i.test(v))return v;try{let u=new URL(v);return /^https?:$/.test(u.protocol)?u.href:''}catch{return ''}}
    function convert(){matrix=parse($('source').value);if(!matrix.length){say('请先粘贴至少一行链接。');return}let c=Math.max(...matrix.map(r=>r.length));roles=Array(c).fill('image');data={};matrix.forEach((r,ri)=>r.forEach((v,ci)=>data[ri+'-'+ci]={url:url(v),uid:'',did:'',xhs:'',phone:''}));say(`已生成 ${matrix.length} 行 × ${c} 列图片卡片。`);render()}
    function render(){if(!matrix.length){$('results').hidden=true;return}let c=roles.length;$('results').hidden=false;$('summary').textContent=`${matrix.length} 行 × ${c} 列`;$('settings').innerHTML=roles.map((r,i)=>`<label>图片列 ${i+1}<select data-c="${i}">${Object.entries(labels).map(([v,l])=>`<option value="${v}" ${v===r?'selected':''}>${l}</option>`).join('')}</select></label>`).join('');$('settings').querySelectorAll('select').forEach(s=>s.onchange=e=>{roles[+e.target.dataset.c]=e.target.value;render()});$('head').innerHTML='<tr><th class="row">行</th>'+roles.map((r,i)=>`<th>图片列 ${i+1}<br><small>${labels[r]}</small></th>`).join('')+'</tr>';$('body').innerHTML=matrix.map((r,ri)=>'<tr><th class="row">'+(ri+1)+'<br><button class="text delete" data-row="'+ri+'">删除</button></th>'+roles.map((role,ci)=>cell(ri,ci,role)).join('')+'</tr>').join('');document.querySelectorAll('.delete').forEach(b=>b.onclick=()=>removeRow(+b.dataset.row))}
    function cell(r,c,role){let x=data[r+'-'+c]||{url:'',uid:'',did:'',xhs:'',phone:''};if(!x.url)return '<td>无效链接</td>';let fields=role==='image'?'':role==='uid_did'?field(r,c,'uid','UID')+field(r,c,'did','DID'):field(r,c,role==='xhs'?'xhs':'phone',role==='xhs'?'小红书号':'手机型号');return `<td><div class="card"><img src="${x.url}" onerror="this.nextElementSibling.hidden=false"><div class="error" hidden>图片无法加载（可能链接过期或限制访问）</div><div class="fields">${fields}</div></div></td>`}function field(r,c,k,n){return `<label>${n}<input data-key="${r}-${c}" data-field="${k}" value="${esc(data[r+'-'+c]?.[k]||'')}"></label>`}function esc(s){return s.replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;')}
    document.addEventListener('input',e=>{if(e.target.dataset.key)data[e.target.dataset.key][e.target.dataset.field]=e.target.value});
    async function recognition(){if(!roles.some(r=>r!=='image'))return say('请先为至少一列选择需识别的字段类型。');$('recognize').disabled=true;say('正在识别，请稍候（免费服务首次访问可能较慢）…');try{let r=await fetch(API+'/recognize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({matrix,columnRoles:roles})});if(!r.ok)throw Error(await r.text());let out=await r.json();Object.entries(out).forEach(([k,v])=>Object.assign(data[k],v));render();say('识别完成，请检查并按需修改结果。')}catch(e){say('识别失败：'+e.message)}finally{$('recognize').disabled=false}}
    async function excel(){if(!matrix.length)return;say('正在生成 Excel…');$('export').disabled=true;try{let r=await fetch(API+'/export-xlsx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({matrix,columnRoles:roles,results:data})});if(!r.ok)throw Error(await r.text());let a=document.createElement('a');a.href=URL.createObjectURL(await r.blob());a.download='链接转图片_嵌入图片.xlsx';a.click();URL.revokeObjectURL(a.href);say('Excel 已下载。')}catch(e){say('导出失败：'+e.message)}finally{$('export').disabled=false}}
    async function addSources(sources){if(!sources.length){say('未检测到可读取的图片。飞书图片请用 Ctrl+V 粘贴到网页空白处。');return}let columns=Math.max(1,Math.min(16,+$('pasteColumns').value||1));let pasted=[];for(let i=0;i<sources.length;i+=columns)pasted.push(sources.slice(i,i+columns));return addMatrix(pasted)}
    function addMatrix(pasted){if(!pasted.length)return;if(!matrix.length){matrix=[];roles=Array(Math.max(...pasted.map(r=>r.length))).fill($('pasteRole').value);data={}}let offset=matrix.length;pasted.forEach((cells,ri)=>{matrix.push(cells);cells.forEach((src,ci)=>data[(offset+ri)+'-'+ci]={url:src,uid:'',did:'',xhs:'',phone:''})});render();if(roles.length===1&&roles[0]!=='image')recognition();else say(`已按 ${roles.length} 列添加 ${pasted.flat().length} 张图片；请设置每列字段后点击“识别已选字段”。`)}
    async function addClipboardImages(items){let sources=[];for(const item of [...items])if(item.type&&item.type.startsWith('image/')){let file=await item.getAsFile();if(file)sources.push(await new Promise((ok,no)=>{let reader=new FileReader();reader.onload=()=>ok(reader.result);reader.onerror=no;reader.readAsDataURL(file)}))}return addSources(sources)}
    function htmlImages(root){let sources=[];for(const image of root.querySelectorAll('img')){for(const name of ['src','data-src','data-origin-src','data-original','data-url','data-image-url']){let value=image.getAttribute(name);if(value)sources.push(value)}let background=image.getAttribute('style')?.match(/url\(['"]?([^'")]+)['"]?\)/i)?.[1];if(background)sources.push(background)}return [...new Set(sources)].filter(s=>/^https?:\/\//i.test(s)||/^data:image\//i.test(s))}
    function htmlMatrix(html){let doc=new DOMParser().parseFromString(html,'text/html'),rows=[...doc.querySelectorAll('tr')].map(row=>[...row.querySelectorAll('td,th')].flatMap(cell=>htmlImages(cell)).filter(Boolean)).filter(row=>row.length);return rows.length?rows:null}
    async function pasteData(clip){let direct=[...clip.items].filter(x=>x.type&&x.type.startsWith('image/'));if(direct.length)return addClipboardImages(direct);let html=clip.getData('text/html')||'',table=htmlMatrix(html);if(table)return addMatrix(table);let doc=new DOMParser().parseFromString(html,'text/html'),sources=htmlImages(doc);if(sources.length)return addSources(sources);say('未检测到可读取的图片。请在飞书中点击图片后复制，或使用“下载图片”后再粘贴。')}
    function removeRow(row){matrix.splice(row,1);let next={};matrix.forEach((cells,ri)=>cells.forEach((_,ci)=>{let old=data[(ri<row?ri:ri+1)+'-'+ci];if(old)next[ri+'-'+ci]=old}));data=next;render();say('已删除该条记录。')}function clearAll(){matrix=[];roles=[];data={};$('source').value='';render();say('已清空全部记录。')}
    async function exportFields(){say('正在导出四列识别结果 Excel…');try{let response=await fetch(API+'/export-fields-xlsx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({matrix,columnRoles:roles,results:data})});if(!response.ok)throw Error(await response.text());let a=document.createElement('a');a.href=URL.createObjectURL(await response.blob());a.download='识别结果_UID_DID_小红书号_手机型号.xlsx';a.click();URL.revokeObjectURL(a.href);say('已导出四列识别结果，UID/DID 等长数字已锁定为文本格式。')}catch(error){say('导出失败：'+error.message)}}
    async function copyOneColumnImages(){if(roles.length!==1)return say('“复制单列图片”仅适用于一列图片。多列请使用嵌入图片的 Excel。');let images=matrix.map((_,ri)=>data[ri+'-0']?.url).filter(Boolean);if(!images.length)return say('没有可复制的图片。');let escape=v=>String(v).replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;');let html='<table><tbody>'+images.map(src=>'<tr><td><img src="'+escape(src)+'" style="max-width:280px;max-height:360px;display:block"></td></tr>').join('')+'</tbody></table>';try{await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob(['已复制 '+images.length+' 张图片'],{type:'text/plain'})})]);say(`已复制 ${images.length} 张单列图片。请立即在飞书表格选中起始单元格后粘贴。`)}catch{say('当前浏览器不支持富文本图片复制；请使用 Chrome，并在 HTTPS 网页中重试。')}}
    function shouldImportImages(clip){if([...clip.items].some(item=>item.type&&item.type.startsWith('image/')))return true;let html=clip.getData('text/html')||'';return html&&htmlImages(new DOMParser().parseFromString(html,'text/html')).length>0}
    $('convert').onclick=convert;$('paste').onclick=async()=>{try{let items=await navigator.clipboard.read(),sources=[];for(const item of items){for(const type of item.types)if(type.startsWith('image/')){let b=await item.getType(type);sources.push(await new Promise((ok,no)=>{let reader=new FileReader();reader.onload=()=>ok(reader.result);reader.onerror=no;reader.readAsDataURL(b)}))}if(item.types.includes('text/html')){let html=await (await item.getType('text/html')).text(),table=htmlMatrix(html);if(table)return addMatrix(table);sources.push(...htmlImages(new DOMParser().parseFromString(html,'text/html')))}}addSources(sources)}catch{say('请将光标放在页面空白处后按 Ctrl+V 粘贴飞书图片。')}};$('clear').onclick=clearAll;document.addEventListener('paste',e=>{let tag=e.target?.tagName;if(tag==='TEXTAREA'||tag==='INPUT'||e.target?.isContentEditable)return;if(e.clipboardData&&shouldImportImages(e.clipboardData))pasteData(e.clipboardData)});$('recognize').onclick=recognition;$('copyImages').onclick=copyOneColumnImages;$('export').onclick=excel;$('fieldsExport').onclick=exportFields;$('example').onclick=()=>{$('source').value='https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=900&q=80\thttps://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80\nhttps://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=900&q=80';say('已填入示例链接。')};
  </script>
</body></html>
